version: "3.9"
services:

  postgres:
    image: postgres:17
    restart: unless-stopped
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    networks:
      - employee-network
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5  


  backend:
    # build: ./backend
    image: kejawa/employee-backend:latest
    container_name: backend
    env_file: 
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy  
    ports:
      - "3000:3000"
    networks:
      - employee-network


  frontend:
    # build: ./frontend
    image: kejawa/employee-frontend:latest
    container_name: frontend
    ports:
      - "8080:80"
    networks:
      - employee-network


  proxy:
    image: nginx:alpine
    container_name: proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl      
    depends_on:
      - backend
      - frontend
    networks:
      - employee-network  

volumes:
  postgres-data:

networks:
  employee-network:
    name: employee-network
    driver: bridge