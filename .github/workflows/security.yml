name: Docker Security

on:
  push:
    branches:
      - main
      - development

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend
        run: docker build -t employee-backend ./backend

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: employee-backend
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: HIGH,CRITICAL