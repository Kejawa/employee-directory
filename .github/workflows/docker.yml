name: Build & Push Docker Images

on:
  push:
    branches:
      - main
      - development

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            kejawa/employee-backend:latest
            kejawa/employee-backend:${{ github.sha }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            kejawa/employee-frontend:latest
            kejawa/employee-frontend:${{ github.sha }}

      - name: Trigger Jenkins
        if: success()
        run: |
          curl -X POST \
            "http://192.168.10.100:8080/generic-webhook-trigger/invoke?token=my-secret-employee-token"      