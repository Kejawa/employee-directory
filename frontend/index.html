<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Directory</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <h1>Employee Directory</h1>

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Email</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="employeeTable">
                <!-- JavaScript will insert employee rows here -->
            </tbody>

        </table>

        <hr>

        <h2>Add Employee</h2>

        <form id="employeeForm">

            <input
                type="text"
                id="name"
                placeholder="Employee Name"
                required>

            <input
                type="text"
                id="department"
                placeholder="Department"
                required>

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required>

            <button type="submit">
                Add Employee
            </button>

        </form>

    </div>

    <script src="app.js"></script>

</body>

</html>
